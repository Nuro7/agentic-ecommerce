services:
  redis:
    image: redis:7-alpine
    container_name: agentic-redis
    ports:
      - "6379:6379"
    volumes:
      - agentic-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile.dev
    container_name: agentic-app
    env_file:
      - ../../.env
    environment:
      # Override Redis to point at the docker network
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ../../app:/app/app
      - ../../alembic.ini:/app/alembic.ini
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  agentic-redis-data:
