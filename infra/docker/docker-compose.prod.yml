# Speako — single-VM production stack (AWS Lightsail / EC2).
# Runs EVERYTHING on one box: Postgres + Redis + web + Celery worker + beat,
# fronted by Caddy for automatic HTTPS. Because Postgres is local to the VM,
# product-sync writes are instant (no cross-region latency) and the worker
# runs for real — solving both the "no worker on free tier" and the sync-hang
# problems in one move.
#
# Usage (from repo root, ON the server):
#   1. put your real values in backend/.env  (see the env table in CLAUDE.md)
#   2. edit infra/docker/Caddyfile → your domain
#   3. export POSTGRES_PASSWORD=<a-strong-password>
#   4. docker compose -f infra/docker/docker-compose.prod.yml up -d --build
#
# Only Caddy is exposed to the internet (80/443). Postgres/Redis/web are
# reachable only inside the compose network.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: agentic_commerce
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  web:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile
    restart: always
    env_file: ../../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://agentic:${POSTGRES_PASSWORD}@postgres:5432/agentic_commerce
      REDIS_URL: redis://redis:6379/0
      PORT: "8000"
    depends_on:
      - postgres
      - redis
    # Dockerfile CMD runs `alembic upgrade head` then uvicorn on $PORT.

  worker:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile
    restart: always
    env_file: ../../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://agentic:${POSTGRES_PASSWORD}@postgres:5432/agentic_commerce
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    command: celery -A src.app.workers.celery_app worker -l info

  beat:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile
    restart: always
    env_file: ../../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://agentic:${POSTGRES_PASSWORD}@postgres:5432/agentic_commerce
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A src.app.workers.celery_app beat -l info

  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
