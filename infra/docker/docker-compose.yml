services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agentic_commerce
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: agentic
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile
    ports:
      - "8000:8000"
    env_file: ../../backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://agentic:agentic@postgres:5432/agentic_commerce}
      REDIS_URL: redis://redis:6379/0
      SPEAKO_ALLOW_RLS_BYPASS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile
    command: celery -A src.app.workers.celery_app worker -l info
    env_file: ../../backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://agentic:agentic@postgres:5432/agentic_commerce}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  beat:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile
    command: celery -A src.app.workers.celery_app beat -l info
    env_file: ../../backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://agentic:agentic@postgres:5432/agentic_commerce}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  migrate:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile
    command: alembic upgrade head
    env_file: ../../backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://agentic:agentic@postgres:5432/agentic_commerce}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
