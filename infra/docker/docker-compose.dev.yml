services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agentic_commerce
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: agentic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.dev
    ports:
      - "8000:8000"
    env_file: ../../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://agentic:agentic@postgres:5432/agentic_commerce
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../../backend/src:/app/src
      - ../../backend/migrations:/app/migrations
      - ../../backend/static:/app/static
    depends_on:
      - postgres
      - redis
    command: uvicorn src.app.server:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.dev
    env_file: ../../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://agentic:agentic@postgres:5432/agentic_commerce
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../../backend/src:/app/src
    depends_on:
      - postgres
      - redis
    command: celery -A src.app.workers.celery_app worker -l info

  beat:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.dev
    env_file: ../../backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../../backend/src:/app/src
    depends_on:
      - redis
    command: celery -A src.app.workers.celery_app beat -l info

volumes:
  postgres_data:
